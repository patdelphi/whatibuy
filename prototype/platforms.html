<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatIBuy - 平台管理</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <span>WhatIBuy</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item"><a href="index.html" class="nav-link"><span class="nav-icon">📊</span>仪表盘</a></li>
            <li class="nav-item"><a href="platforms.html" class="nav-link active"><span class="nav-icon">🛒</span>平台管理</a></li>
            <li class="nav-item"><a href="analysis.html" class="nav-link"><span class="nav-icon">📈</span>消费分析</a></li>
            <li class="nav-item"><a href="chat.html" class="nav-link"><span class="nav-icon">🤖</span>AI 助手</a></li>
            <li class="nav-item"><a href="settings.html" class="nav-link"><span class="nav-icon">⚙️</span>系统设置</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title">平台管理</h1>
            <button class="btn btn-primary" onclick="alert('打开添加平台弹窗')">+ 添加平台</button>
        </header>

        <div class="platform-list">
            <!-- 淘宝 -->
            <div class="card platform-card">
                <div class="platform-header">
                    <div class="platform-icon" style="color: #ff5000;">淘</div>
                    <div>
                        <div class="card-title" style="margin-bottom: 0;">淘宝</div>
                        <div style="font-size: 0.875rem; color: #10b981;">● 已登录</div>
                    </div>
                </div>
                <div style="margin-bottom: 1rem; color: #6b7280; font-size: 0.875rem;">
                    上次同步：2小时前<br>
                    已获取订单：84
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-primary" style="flex: 1;" onclick="syncPlatform('淘宝')">立即同步</button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="alert('正在打开浏览器进行淘宝登录...')">重新登录</button>
                </div>
            </div>

            <!-- 京东 -->
            <div class="card platform-card">
                <div class="platform-header">
                    <div class="platform-icon" style="color: #e1251b;">京</div>
                    <div>
                        <div class="card-title" style="margin-bottom: 0;">京东</div>
                        <div style="font-size: 0.875rem; color: #10b981;">● 已登录</div>
                    </div>
                </div>
                <div style="margin-bottom: 1rem; color: #6b7280; font-size: 0.875rem;">
                    上次同步：昨天<br>
                    已获取订单：45
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-primary" style="flex: 1;" onclick="syncPlatform('京东')">立即同步</button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="alert('正在打开浏览器进行京东登录...')">重新登录</button>
                </div>
            </div>

            <!-- 拼多多 -->
            <div class="card platform-card">
                <div class="platform-header">
                    <div class="platform-icon" style="color: #e02e24;">拼</div>
                    <div>
                        <div class="card-title" style="margin-bottom: 0;">拼多多</div>
                        <div style="font-size: 0.875rem; color: #10b981;">● 已登录</div>
                    </div>
                </div>
                <div style="margin-bottom: 1rem; color: #6b7280; font-size: 0.875rem;">
                    上次同步：3天前<br>
                    已获取订单：12
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-primary" style="flex: 1;" onclick="syncPlatform('拼多多')">立即同步</button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="alert('正在打开浏览器进行拼多多登录...')">重新登录</button>
                </div>
            </div>

            <!-- 闲鱼 -->
            <div class="card platform-card" style="border: 1px dashed #ef4444;">
                <div class="platform-header">
                    <div class="platform-icon" style="color: #ffda44;">闲</div>
                    <div>
                        <div class="card-title" style="margin-bottom: 0;">闲鱼</div>
                        <div style="font-size: 0.875rem; color: #ef4444;">● 需登录</div>
                    </div>
                </div>
                <div style="margin-bottom: 1rem; color: #6b7280; font-size: 0.875rem;">
                    上次同步：从未<br>
                    已获取订单：0
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-secondary" disabled style="flex: 1; opacity: 0.5;">立即同步</button>
                    <button class="btn btn-primary" style="flex: 1;" onclick="alert('正在打开浏览器进行闲鱼登录...')">去登录</button>
                </div>
            </div>
        </div>

        <!-- 添加平台表单 (Mock) -->
        <div class="card" style="margin-top: 2rem;">
            <h2 class="card-title">平台配置详情 (演示)</h2>
            <p style="color: #6b7280; font-size: 0.875rem; margin-bottom: 1rem;">
                此部分演示可配置平台的需求功能。
            </p>
            <div class="grid-2">
                <div class="form-group">
                    <label>平台名称</label>
                    <input type="text" placeholder="例如：亚马逊中国">
                </div>
                <div class="form-group">
                    <label>基础 URL</label>
                    <input type="text" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>登录页面 URL</label>
                    <input type="text" placeholder="https://.../login">
                </div>
                <div class="form-group">
                    <label>订单历史 URL</label>
                    <input type="text" placeholder="https://.../orders">
                </div>
            </div>
            <button class="btn btn-secondary" onclick="alert('配置已保存')">保存配置</button>
        </div>
    </main>
</body>
</html>
